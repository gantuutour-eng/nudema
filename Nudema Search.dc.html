<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Хайх · Nudema Mongolia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="./nudema-store.js"></script><script src="./nudema-cart.js"></script><link rel="stylesheet" href="./user-ui.css"><script src="./user-ui.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0}body{font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1a1c1a;background:#fff}a{text-decoration:none;color:inherit}button,input{font:inherit}.page{min-height:100vh;padding-bottom:80px}.header{height:68px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;background:#fff;z-index:10}.logo{font-size:22px;font-weight:800;letter-spacing:.08em;color:#2a54e6}.icon{width:40px;height:40px;border:0;background:none;display:flex;align-items:center;justify-content:center;position:relative}.badge{position:absolute;right:0;top:0;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#2a54e6;color:#fff;font-size:10px;font-weight:800;line-height:18px}.main{max-width:1120px;margin:0 auto;padding:42px 28px 80px}.title{font-size:30px;color:#16255f;margin:0 0 22px}.search-box{display:flex;align-items:center;border:2px solid #2a54e6;border-radius:15px;height:58px;padding:0 18px;gap:12px;max-width:720px}.search-box input{border:0;outline:0;width:100%;font-size:16px}.summary{font-size:13px;color:#8a90a3;margin:20px 2px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px 16px}.card{min-width:0}.photo{display:block;aspect-ratio:1/1;background:#f4f5f3;border-radius:16px;overflow:hidden}.photo img{width:100%;height:100%;object-fit:contain}.category{font-size:11px;color:#8a90a3;margin-top:13px}.name{display:block;font-size:14px;font-weight:700;color:#26302a;margin-top:5px;line-height:1.45;min-height:40px}.price{font-size:16px;font-weight:800;margin-top:7px}.add{width:100%;height:40px;border:1px solid #2a54e6;background:#fff;color:#2a54e6;border-radius:10px;font-size:12px;font-weight:800;margin-top:11px;cursor:pointer}.empty{display:none;text-align:center;padding:70px 20px;color:#8a90a3}.bottom{display:none}.footer{background:#2a54e6;color:#b7c4ee;padding:32px max(22px,calc((100% - 1120px)/2));font-size:11px;line-height:1.8}.footer strong{display:block;color:#fff;font-size:18px;margin-bottom:8px;letter-spacing:.08em}
@media(max-width:700px){.page{padding-bottom:calc(78px + env(safe-area-inset-bottom))}.header{height:60px;padding:0 14px}.main{padding:26px 16px 54px}.title{font-size:23px;margin-bottom:17px}.search-box{height:52px;border-radius:13px}.grid{grid-template-columns:repeat(2,1fr);gap:24px 12px}.name{font-size:12.5px;min-height:38px}.price{font-size:14px}.footer{padding:28px 20px 34px}.bottom{position:fixed;display:flex;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:20;padding:9px 0 calc(11px + env(safe-area-inset-bottom));justify-content:space-around}.bottom a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#8a90a3}.bottom a.active{color:#2a54e6}.bottom svg{width:22px;height:22px}.bottom .cart-tab{position:relative}.bottom .badge{right:4px;top:-6px}}
</style>
</head>
<body><div class="page">
<header class="header"><a class="icon" href="Nudema%20Mobile.dc.html" aria-label="Нүүр">←</a><a class="logo" href="Nudema%20Mobile.dc.html">NUDEMA</a><a class="icon" href="Nudema%20Cart.dc.html" aria-label="Сагс"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg><span class="badge" data-cart-count hidden>0</span></a></header>
<main class="main"><h1 class="title">Бүтээгдэхүүн хайх</h1><label class="search-box"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2a54e6" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg><input id="searchInput" type="search" autocomplete="off" placeholder="Бүтээгдэхүүний нэр, ангилал..." autofocus></label><div id="summary" class="summary"></div><section id="results" class="grid"></section><div id="empty" class="empty">Тохирох бүтээгдэхүүн олдсонгүй.</div></main>
<footer class="footer"><strong>NUDEMA</strong>Nudema Mongolia ХХК · Улаанбаатар хот<br>И-мэйл: help@nudema.mn · Утас: 7011-5007</footer>
<nav class="bottom" aria-label="Mobile navigation">
<a href="Nudema%20Mobile.dc.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Нүүр</a>
<a class="active" href="Nudema%20Search.dc.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>Хайх</a>
<a class="cart-tab" href="Nudema%20Cart.dc.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg><span class="badge" data-cart-count hidden>0</span>Сагс</a>
<a href="Nudema%20Account.dc.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Профайл</a>
</nav></div>
<script>
(function(){
  var input=document.getElementById('searchInput'),results=document.getElementById('results'),empty=document.getElementById('empty'),summary=document.getElementById('summary');
  var products=NudemaStore.read('products')||[];
  var initial=new URLSearchParams(location.search).get('q')||''; input.value=initial;
  function esc(value){return String(value==null?'':value).replace(/[&<>"']/g,function(ch){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]});}
  function render(){var q=input.value.trim().toLowerCase();var filtered=products.filter(function(p){return !q||[p.title,p.category,p.desc,p.badge].join(' ').toLowerCase().includes(q)});results.innerHTML=filtered.map(function(p){var img=p.img||(Array.isArray(p.images)&&p.images[0])||'';return '<article class="card"><a class="photo" href="Nudema%20Product.dc.html?id='+encodeURIComponent(p.id)+'">'+(img?'<img src="'+esc(img)+'" alt="">':'')+'</a><div class="category">'+esc(p.category||'')+'</div><a class="name" href="Nudema%20Product.dc.html?id='+encodeURIComponent(p.id)+'">'+esc(p.title||'')+'</a><div class="price">'+NudemaStore.money(p.price)+'₮</div><button class="add" data-add="'+esc(p.id)+'">Сагсанд нэмэх</button></article>'}).join('');summary.textContent=filtered.length+' бүтээгдэхүүн';empty.style.display=filtered.length?'none':'block';results.style.display=filtered.length?'grid':'none';}
  input.addEventListener('input',render);results.addEventListener('click',function(e){var button=e.target.closest('[data-add]');if(!button)return;NudemaCart.add(button.getAttribute('data-add'),1,0);button.textContent='✓ Нэмэгдлээ';setTimeout(function(){button.textContent='Сагсанд нэмэх'},900)});NudemaStore.subscribe(function(name){if(!name||name==='products'){products=NudemaStore.read('products')||[];render()}});render();
}());
</script></body></html>
