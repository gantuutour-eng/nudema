<title>Nudema Mongolia</title>
<!-- Үндсэн хаяг: төхөөрөмжөөс хамаарч PC эсвэл мобайл хувилбар руу шилжинэ.
     Бүх хуудсын жагсаалт: /menu.html -->
<link rel="canonical" href="./Nudema%20Mongolia.dc.html">
<script>
  (function () {
    var PC = './Nudema%20Mongolia.dc.html';
    var MOBILE = './Nudema%20Mobile.dc.html';

    // ?v=pc / ?v=mobile гэж хүчээр сонгож болно (тест хийхэд хэрэгтэй)
    var forced = (location.search.match(/[?&]v=(pc|mobile)/) || [])[1];
    if (forced) { location.replace(forced === 'mobile' ? MOBILE : PC); return; }

    var ua = navigator.userAgent || '';
    // iPad-ын шинэ хувилбарууд desktop UA илгээдэг тул мэдрэгчээр нь давхар шалгана
    var iPadOS = /Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
    var phoneUA = /Android|iPhone|iPod|Windows Phone|IEMobile|BlackBerry|Opera Mini/i.test(ua);
    var narrow = Math.min(window.innerWidth || 0, window.screen ? window.screen.width : 0) < 820;

    location.replace((phoneUA || iPadOS || narrow) ? MOBILE : PC);
  })();
</script>
<noscript><meta http-equiv="refresh" content="0; url=./Nudema%20Mongolia.dc.html"></noscript>
