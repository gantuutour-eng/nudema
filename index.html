<title>Nudema Mongolia</title>
<!-- Үндсэн хаяг: төхөөрөмжөөс хамаарч PC эсвэл мобайл хувилбар руу шилжинэ.
     Бүх хуудсын жагсаалт: /menu.html · Оношилгоо: /whoami.html -->
<link rel="canonical" href="./Nudema%20Mongolia.dc.html">
<script>
  (function () {
    var PC = './Nudema%20Mongolia.dc.html';
    var MOBILE = './Nudema%20Mobile.dc.html';

    // ?v=pc / ?v=mobile гэж хүчээр сонгож болно
    var forced = (location.search.match(/[?&]v=(pc|mobile)/) || [])[1];
    if (forced) { location.replace(forced === 'mobile' ? MOBILE : PC); return; }

    var ua = navigator.userAgent || '';
    var uaData = navigator.userAgentData;

    // 1) Chromium-д хамгийн найдвартай дохио (Android, апп доторх хөтөч ч мөн)
    if (uaData && uaData.mobile === true) { location.replace(MOBILE); return; }

    // 2) UA — "Mobi" нь ихэнх мобайл ба апп доторх хөтчид байдаг
    if (/Android|iPhone|iPod|IEMobile|BlackBerry|Opera Mini|Mobi/i.test(ua)) {
      location.replace(MOBILE); return;
    }

    // 3) Шинэ iPad-ууд desktop UA илгээдэг тул мэдрэгчээр нь
    if (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1) { location.replace(MOBILE); return; }

    // 4) Өргөнөөр. screen.width нь Android дээр физик пиксел заадаг тул
    //    зөвхөн layout-ийн өргөнийг ашиглана.
    var w = Math.min(
      document.documentElement.clientWidth || 99999,
      window.innerWidth || 99999
    );
    if (w < 820) { location.replace(MOBILE); return; }

    // 5) Хуруугаар удирддаг жижиг дэлгэц
    if (window.matchMedia && matchMedia('(pointer: coarse)').matches && w < 1024) {
      location.replace(MOBILE); return;
    }

    location.replace(PC);
  })();
</script>
